<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Contacto</title>
</head>
<body>
    <section class="contacto">
<div class="contacto_contenedor">
 <h1>CONTACTO</h1>
    <p>Contáctanos por WhatsApp</p>
        <form class="contacto_formulario">
            <input type="text" placeholder="Nombre" required>
            <input type="text" placeholder="Apellidos" required>
            <input type="text" placeholder="Ingrese su DNI" pattern="[0-9]{8}" required>
            <select required>
                <option>Seleccione una sede</option>
                <option>Yarinacocha</option>
                <option>Callería</option>
                <option>Manantay</option>
                <option>Campo Verde</option>
                <option>San José de Yarinacocha</option>
            </select>
            <button>
                <img src="IMAGENES/WHATSAPP.png" alt="WHATSAPP">
                Consultar
            </button>
        </form>
</div>
</section>
</body>
</html>
